version: "3.9"

services:
  rag-api:
    build: .
    container_name: highwatch-rag
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage       # Persist FAISS index between restarts
      - ./downloads:/app/downloads   # Persist downloaded Drive files
    restart: unless-stopped
